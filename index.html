<head>

    <title>Chi Tiết: NHẤT QUYỀN ĐẢ KHỨ + LÃO HỔ VỒ MỒI + TRỬU PHONG ĐẢ BỒI + SONG ĐAO PHẠT MỘC + SONG PHI CƯỚC KHỨ</title>
    <style>
        /* Phong cách mộc mạc, đơn giản, gần gũi với võ thuật cổ truyền */
        body {
            font-family: 'Times New Roman', serif;
            background-color: #fdfbf7; /* Màu nền kem giấy cũ */
            color: #3e2723; /* Màu chữ nâu sẫm trang nghiêm */
            margin: 0;
            padding: 20px;
            line-height: 1.8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #5d4037; /* Màu nâu đất ấm áp hơn cho tiêu đề */
            font-size: 2em;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #a1887f; /* Đường kẻ đứt tinh tế */
            text-transform: uppercase; /* Viết hoa giống image_1.png */
        }

        /* Khung phát video MP4: Loại bỏ khung màu be lớn, chỉ giữ viền mỏng */
        .video-container {
            text-align: center;
            margin-bottom: 40px;
        }

        video {
            width: 100%;
            max-width: 600px;
            height: auto;
            outline: none;
            border: 2px solid #8d6e63; /* Viền mỏng màu nâu sẫm, tinh tế hơn viền vàng */
            border-radius: 0; /* Giữ nguyên hình chữ nhật mộc mạc */
        }

        /* Khung chứa từng nhịp động tác */
        .step {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e2d8d3; /* Đường kẻ phân cách */
        }

        h2 {
            color: #6d4c41; /* Màu nâu đất cho tiêu đề phụ */
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        p {
            text-align: justify;
            margin-bottom: 15px;
        }

        /* Hình ảnh minh họa: Khung chữ nhật, viền mỏng nâu sẫm nhất quán */
        .image-container {
            text-align: center;
        }

        .action-image {
            max-width: 100%;
            height: auto;
            border: 2px solid #8d6e63; /* Viền mỏng màu nâu sẫm, đồng bộ với video */
            border-radius: 0; /* Giữ nguyên hình chữ nhật */
            display: inline-block;
        }

        /* Link quay lại trang trước */
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #5d4037;
            text-decoration: none;
            font-weight: bold;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
